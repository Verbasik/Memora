
# Codex CLI — проектная конфигурация
#
# Для работы hooks требуется однократная глобальная активация:
#   codex features enable codex_hooks
#
# Feature flags читаются только из ~/.codex/config.toml.
# [features] в project-config Codex игнорирует.
# Проект уже помечен trusted в ~/.codex/config.toml автоматически
# (аналог --trust-project из старых версий).

[project]
sandbox = "workspace-write"

[project.agents_md]
project_doc_fallback_filenames = ["CLAUDE.md"]

# ── Hooks ──────────────────────────────────────────────
# СТАТУС: НЕ РАБОТАЕТ в Codex CLI v0.121.0 (верифицировано 2026-04-17).
#
# Проблема: Codex CLI не вызывает hooks ни из project config, ни из
# ~/.codex/config.toml — ни в `codex exec`, ни в интерактивном TUI.
# Функциональность `codex_hooks` помечена как `under development`
# (codex features list → codex_hooks: under development / true).
#
# Все JS-хуки ниже написаны и unit-тесты проходят. При ручном вызове
# через `sh -c` работают корректно. Конфигурация оставлена для будущей
# версии Codex CLI с рабочей поддержкой hooks.
#
# Отслеживать: обновления Codex CLI > v0.121.0 с fix для codex_hooks.
# Задокументировано как FR-206 в docs/TZ/90_FR_COVERAGE.md.

[hooks.SessionStart]
command = "node \"$(git rev-parse --show-toplevel)/.codex/hooks/session-start.js\""

[hooks.UserPromptSubmit]
command = "node \"$(git rev-parse --show-toplevel)/.codex/hooks/user-prompt-submit.js\""

[hooks.PreToolUse]
command = "node \"$(git rev-parse --show-toplevel)/.codex/hooks/pre-tool-use.js\""

[hooks.Stop]
command = "bash \"$(git rev-parse --show-toplevel)/memory-bank/scripts/run-stop-hooks.sh\""

# ── Fallback: notify (если hooks не работают) ──────────
# Раскомментируй если [hooks.Stop] не поддерживается:
#
# [notify]
# command = "bash \"$(git rev-parse --show-toplevel)/memory-bank/scripts/run-stop-hooks.sh\""

