
# Codex CLI — проектная конфигурация
#
# Для работы hooks требуется однократная глобальная активация:
#   codex features enable codex_hooks
#
# Feature flags читаются только из ~/.codex/config.toml.
# [features] в project-config Codex игнорирует.
# Проект уже помечен trusted в ~/.codex/config.toml автоматически
# (аналог --trust-project из старых версий).

[project]
sandbox = "workspace-write"

[project.agents_md]
project_doc_fallback_filenames = ["CLAUDE.md"]

# ── Hooks ──────────────────────────────────────────────
# Hooks объявляются в .codex/hooks.json (НЕ в config.toml).
# Источник: официальные docs OpenAI Codex, 2026-04-17.
#   https://developers.openai.com/codex/hooks
#   https://developers.openai.com/codex/config-reference
#
# Требования:
#   1. codex_hooks = true в ~/.codex/config.toml  (уже выставлено)
#   2. .codex/hooks.json в корне репо              (создан)
#
# Формат hooks.json: { "hooks": { "SessionStart": [...], ... } }
# Repo-local и ~/.codex/hooks.json запускаются оба (не override'ят друг друга).

