name: Memory Quality

on:
  push:
    branches: ["**"]
    paths:
      - "memory-bank/**"
      - "schemas/**"
      - "lib/**"
      - "init.sh"
      - "scaffold.manifest.json"
      - ".claude/**"
      - ".codex/**"
      - ".qwen/**"
      - ".opencode/**"
      - ".githooks/**"
      - ".github/workflows/**"
      - "**.md"
      - "bin/**"
  pull_request:
    paths:
      - "memory-bank/**"
      - "schemas/**"
      - "lib/**"
      - "init.sh"
      - "scaffold.manifest.json"
      - ".claude/**"
      - ".codex/**"
      - ".qwen/**"
      - ".opencode/**"
      - ".githooks/**"
      - ".github/workflows/**"
      - "**.md"
      - "bin/**"

jobs:
  # ── Memory scope: schema, frontmatter, session limits, privacy, links ─────────
  validate-memory:
    name: "🔍 Validate — memory scope (blocking)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "memora validate --scope memory --profile core"
        run: node bin/memora.js validate --scope memory --profile core --format text

  # ── Repo-docs scope: README.md and docs/** link integrity ─────────────────────
  validate-repo-docs:
    name: "📄 Validate — repo-docs scope (blocking)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "memora validate --scope repo-docs --profile core"
        run: node bin/memora.js validate --scope repo-docs --profile core --format text

  # ── All scopes extended: advisory, does not block merge ──────────────────────
  validate-extended:
    name: "🔎 Validate — all scopes extended (advisory)"
    runs-on: ubuntu-latest
    needs: [validate-memory, validate-repo-docs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "memora validate --scope all --profile extended (advisory)"
        run: node bin/memora.js validate --scope all --profile extended --format text
        continue-on-error: true

      - name: "memora validate --scope all --profile governance (machine-readable report)"
        run: node bin/memora.js validate --scope all --profile governance --format json > /tmp/validation-report.json 2>&1 || true

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report
          path: /tmp/validation-report.json

  # ── Doctor: scaffold parity and operational health ────────────────────────────
  doctor:
    name: "🩺 Doctor"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: memora doctor
        run: node bin/memora.js doctor

  # ── Smoke tests ───────────────────────────────────────────────────────────────
  smoke-install:
    name: "🧪 Smoke Install"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke tests
        run: npm test

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdownlint:
    name: "📝 Markdownlint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: |
          markdownlint-cli2 \
            "**/*.md" \
            "#node_modules/**" \
            "#.git/**"
